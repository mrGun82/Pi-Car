<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>树莓派小车 - 首页</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 90%;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .message {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 30px 0;
            color: #667eea;
            font-size: 1.2em;
            border-left: 5px solid #667eea;
            text-align: left;
        }

        .time {
            color: #666;
            font-size: 1.1em;
            margin: 20px 0;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .nav-link {
            background: #f0f0f0;
            color: #555;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .nav-link:hover {
            background: #667eea;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .footer {
            margin-top: 40px;
            color: #999;
            font-size: 0.9em;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .nav-links {
                flex-direction: column;
            }

            .nav-link {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🚗 树莓派智能小车</h1>

    <div class="time" th:text="'当前时间: ' + ${time}">当前时间: </div>

    <div class="message" th:text="${message}">
        欢迎信息
    </div>

    <div class="nav-links">
        <a href="/hello" class="nav-link">👋 测试页面</a>
        <a href="/control" class="nav-link">🎮 控制面板</a>
        <a href="/about" class="nav-link">ℹ️ 关于项目</a>
    </div>

    <div class="footer">
        ⚡ car-web 模块 · 测试页面
    </div>
</div>
</body>
</html>
